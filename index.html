<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#dce8e7">
  <title>Hi Bean</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <!-- 背景画布 -->
    <div id="large-header" class="large-header">
      <canvas id="demo-canvas"></canvas>
    </div>

    <!-- 顶部时钟区 -->
    <section class="top-section" aria-label="时钟">
      <div class="time" id="time" data-hours="00" data-minutes="00" data-seconds="00">
        <div class="digit"><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div></div>
        <div class="digit"><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div></div>
        <div class="digit"><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div></div>
        <div class="digit"><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div></div>
        <div class="digit"><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div></div>
        <div class="digit"><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div></div>
      </div>
    </section>

    <!-- 左侧按钮区 -->
    <section class="left-section" aria-label="快捷操作">
      <button class="image-button wechat-button" id="wechat-button" type="button" aria-label="显示微信二维码">
        <img src="wechat.png" alt="微信" class="wechat-image">
      </button>
      <div class="qrcode-popup" id="wechat-qrcode-popup" aria-hidden="true">
        <img src="二维码.jpg" alt="微信二维码" class="qrcode-image">
      </div>
    </section>

    <!-- 右侧个人信息区 -->
    <section class="right-section" aria-label="个人信息">
      <div class="xingxiang-section">
        <span class="name-text">Bean</span>
        <img src="人物形象.png" alt="角色信息" class="role-image">
      </div>
      <a href="mailto:celinechen2000c@gmail.com" class="email-link">
        <img src="https://www.wbaipm.com/images/email.png" alt="Email" class="email-image">
      </a>
    </section>

    <!-- 中间导航链接区 -->
    <section class="center-section" aria-label="个人链接">
      <nav class="list-section">
        <button class="list-item agent-button" id="agent-chat-trigger" type="button">
          <img src="https://www.wbaipm.com/images/L.png" alt="" class="list-item-L">
          <div class="list-item-C"></div>
          <img src="https://www.wbaipm.com/images/R.png" alt="" class="list-item-R">
          <span class="list-item-text">了解更多的我</span>
        </button>
        <a href="https://docs.qq.com/space/DSmhPdWptYVZTb0pX" class="list-item dark" target="_blank" rel="noopener">
          <img src="https://www.wbaipm.com/images/zL.png" alt="" class="list-item-L">
          <div class="list-item-C"></div>
          <img src="https://www.wbaipm.com/images/zR.png" alt="" class="list-item-R">
          <span class="list-item-text">资料库</span>
        </a>
        <a href="https://github.com/celinechen2000c-blip" class="list-item" target="_blank" rel="noopener">
          <img src="https://www.wbaipm.com/images/L.png" alt="" class="list-item-L">
          <div class="list-item-C"></div>
          <img src="https://www.wbaipm.com/images/R.png" alt="" class="list-item-R">
          <span class="list-item-text">杂物间</span>
        </a>
        <a href="https://space.bilibili.com/1390202" class="list-item dark" target="_blank" rel="noopener">
          <img src="https://www.wbaipm.com/images/L.png" alt="" class="list-item-L">
          <div class="list-item-C"></div>
          <img src="https://www.wbaipm.com/images/R.png" alt="" class="list-item-R">
          <span class="list-item-text">创意工坊</span>
        </a>
      </nav>
    </section>

  </main>

  <!-- 遮罩层 -->
  <div class="chat-overlay" id="chat-overlay" aria-hidden="true"></div>

  <!-- 聊天面板（玻璃框架） -->
  <aside class="chat-panel" id="chat-panel" aria-hidden="true">
    <div class="chat-panel-header">
      <span class="chat-panel-title">Hi Bean · AI</span>
      <button class="chat-panel-close" id="chat-panel-close" type="button" aria-label="关闭聊天">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="chat-panel-body" id="chat-panel-body">
      <div class="chat-messages" id="chat-messages">
        <!-- 欢迎消息 -->
        <div class="chat-bubble agent">
          <img class="chat-bubble-avatar" src="人物形象.png" alt="">
          <div class="chat-bubble-text">你好，我是 Bean 的 AI 助手。有什么想了解的吗？</div>
        </div>
      </div>
      <div class="chat-input-area">
        <textarea
          class="chat-input"
          id="chat-input"
          rows="1"
          placeholder="输入消息…"
          aria-label="输入聊天消息"
        ></textarea>
        <button class="chat-send" id="chat-send" type="button" aria-label="发送">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M2 10L18 2L10 18L8 12L2 10Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
